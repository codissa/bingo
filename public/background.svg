<svg xmlns="http://www.w3.org/2000/svg" width="1816" height="1284" viewBox="0 0 1816 1284" role="img" aria-label="Warm vector background inspired by a Jaffa church courtyard with scout references">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8efe2"/>
      <stop offset="0.48" stop-color="#fbf6ec"/>
      <stop offset="1" stop-color="#eadcc7"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="48%" cy="20%" r="65%">
      <stop offset="0" stop-color="#fffaf1" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#f3e6d3" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#dec8a6" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .line{fill:none;stroke:#b08b55;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.72}
      .thin{fill:none;stroke:#b08b55;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;opacity:.48}
      .wash{fill:#dcc79e;opacity:.22}
      .leaf{fill:#9aa078;opacity:.52}
      .leaf2{fill:#6f7d58;opacity:.34}
      .dark{fill:#6d6747;opacity:.48}
      .scout{fill:none;stroke:#8f6d3e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
    </style>
  </defs>

